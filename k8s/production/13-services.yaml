# Production: app-service is ClusterIP (internal only — traffic flows through Kong)
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: production
  labels:
    app: nesnes-app
    env: production
spec:
  type: ClusterIP
  selector:
    app: nesnes-app
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
# Frontend — LoadBalancer (or NodePort for Minikube)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: production
  labels:
    app: nesnes-frontend
    env: production
spec:
  type: NodePort
  selector:
    app: nesnes-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 32080
---
# Kong — NodePort (acts as the main entry point for API)
apiVersion: v1
kind: Service
metadata:
  name: kong-service
  namespace: production
  labels:
    app: kong
    env: production
spec:
  type: NodePort
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      nodePort: 32700
    - name: admin
      port: 8001
      targetPort: 8001
      nodePort: 32701
---
# Prometheus — ClusterIP (internal, scraped by Grafana only)
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: production
  labels:
    app: prometheus
    env: production
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
# Grafana — NodePort for dashboard access
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: production
  labels:
    app: grafana
    env: production
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 32300
