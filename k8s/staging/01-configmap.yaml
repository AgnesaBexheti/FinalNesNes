apiVersion: v1
kind: ConfigMap
metadata:
  name: nesnes-config
  namespace: staging
  labels:
    app: nesnes
    env: staging
data:
  NODE_ENV: "staging"
  PORT: "5000"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "webstore"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  ELASTICSEARCH_HOST: "elasticsearch"
  ELASTICSEARCH_PORT: "9200"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: staging
  labels:
    app: kong
    env: staging
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: nesnes-api
        url: http://app-service:5000
        connect_timeout: 60000
        write_timeout: 60000
        read_timeout: 60000
        retries: 5
        routes:
          - name: api-route
            paths:
              - /api
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
          - name: graphql-route
            paths:
              - /graphql
            strip_path: false
            methods:
              - GET
              - POST
              - OPTIONS

    plugins:
      - name: rate-limiting
        config:
          minute: 300
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: true
          max_age: 3600
      - name: file-log
        config:
          path: /dev/stdout
          reopen: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: staging
  labels:
    app: prometheus
    env: staging
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        monitor: 'nesnes-staging'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'nesnes-app'
        static_configs:
          - targets: ['app-service:5000']
            labels:
              service: 'nesnes-api'
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'kong'
        static_configs:
          - targets: ['kong-service:8001']
            labels:
              service: 'kong-gateway'
        metrics_path: /metrics

      - job_name: 'elasticsearch'
        static_configs:
          - targets: ['elasticsearch:9200']
            labels:
              service: 'elasticsearch'
        metrics_path: /_prometheus/metrics
        scrape_interval: 30s
