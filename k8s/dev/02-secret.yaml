# IMPORTANT: In production, manage secrets with a secrets manager (Vault, AWS Secrets Manager, etc.)
# stringData is automatically base64-encoded by the Kubernetes API server.
apiVersion: v1
kind: Secret
metadata:
  name: nesnes-secret
  namespace: development
  labels:
    app: nesnes
    env: development
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASS: "postgres123"
  JWT_SECRET: "dev-jwt-secret-nesnes-key-change-in-production"
  PGADMIN_EMAIL: "admin@admin.com"
  PGADMIN_PASS: "admin123"
