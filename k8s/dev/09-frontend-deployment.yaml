apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: development
  labels:
    app: nesnes-frontend
    env: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nesnes-frontend
  template:
    metadata:
      labels:
        app: nesnes-frontend
        env: development
    spec:
      containers:
        - name: nesnes-frontend
          image: agnesabexheti/nesnes-frontend:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
